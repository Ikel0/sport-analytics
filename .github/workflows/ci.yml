name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (flake8)
        run: flake8 ingestion/ transformation/ models/ tests/ --max-line-length=100

      - name: Format check (black)
        run: black --check ingestion/ transformation/ models/ tests/

      - name: Import sort check (isort)
        run: isort --check-only ingestion/ transformation/ models/ tests/

      - name: Run tests
        env:
          BALLDONTLIE_API_KEY: "test_key"
          APIFOOTBALL_API_KEY: "test_key"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
          AWS_REGION: "eu-west-1"
          S3_BUCKET_NAME: "test-bucket"
          SNOWFLAKE_ACCOUNT: "test"
          SNOWFLAKE_USER: "test"
          SNOWFLAKE_PASSWORD: "test"
        run: pytest tests/ -v --cov=ingestion --cov=transformation --cov=models --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
