[flake8]
max-line-length = 100
exclude =
    .git,
    __pycache__,
    .venv,
    airflow/logs,
    data/
ignore = E203, W503

[isort]
profile = black
line_length = 100
known_first_party = ingestion,transformation,models,dashboard

[mypy]
python_version = 3.11
ignore_missing_imports = True
warn_return_any = False

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
